<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>AriAI — Your AI mentor, coach, and guide</title>
<style>
  :root {
    --bg: #f3f0ff;
    --container-bg: #ffffff;
    --text: #1f1b2e;
    --muted: #6b6685;
    --rei-bubble: #ede7ff;
    --rei-bubble-text: #2a2342;
    --user-bubble: #7c5cff;
    --user-bubble-text: #ffffff;
    --border: #e6e0f5;
    --accent: #7c5cff;
    --accent-hover: #6a48f0;
    --disabled: #cfc8e6;
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    padding: 0;
    height: 100%;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    font-size: 16px;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
    display: flex;
    justify-content: center;
  }

  .app {
    width: 100%;
    max-width: 700px;
    height: 100vh;
    height: 100dvh;
    display: flex;
    flex-direction: column;
    background: var(--container-bg);
    border-left: 1px solid var(--border);
    border-right: 1px solid var(--border);
  }

  header {
    padding: 32px 24px 20px;
    text-align: center;
    border-bottom: 1px solid var(--border);
  }

  header h1 {
    margin: 0;
    font-size: 28px;
    font-weight: 700;
    letter-spacing: -0.01em;
  }

  header p {
    margin: 6px 0 0;
    font-size: 15px;
    color: var(--muted);
  }

  .messages {
    flex: 1;
    overflow-y: auto;
    padding: 24px;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .msg {
    max-width: 80%;
    padding: 12px 16px;
    border-radius: 18px;
    font-size: 15px;
    line-height: 1.45;
    word-wrap: break-word;
    overflow-wrap: anywhere;
    animation: fadeIn 180ms ease-out;
  }

  .msg--rei {
    background: var(--rei-bubble);
    color: var(--rei-bubble-text);
    align-self: flex-start;
    border-bottom-left-radius: 6px;
  }

  .msg--user {
    background: var(--user-bubble);
    color: var(--user-bubble-text);
    align-self: flex-end;
    border-bottom-right-radius: 6px;
  }

  .msg--typing {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    padding: 14px 16px;
  }

  .msg--typing span {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: var(--muted);
    opacity: 0.5;
    animation: bounce 1.2s infinite;
  }

  .msg--typing span:nth-child(2) { animation-delay: 0.15s; }
  .msg--typing span:nth-child(3) { animation-delay: 0.3s; }

  @keyframes bounce {
    0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
    30%           { transform: translateY(-5px); opacity: 1; }
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(4px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  form.composer {
    display: flex;
    gap: 8px;
    padding: 12px 16px;
    border-top: 1px solid var(--border);
    background: var(--container-bg);
  }

  .composer input {
    flex: 1;
    min-height: 44px;
    padding: 0 16px;
    font-size: 16px;
    font-family: inherit;
    color: var(--text);
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 22px;
    outline: none;
    transition: border-color 120ms ease, background 120ms ease;
  }

  .composer input:focus {
    border-color: var(--accent);
    background: #ffffff;
  }

  .composer button {
    min-width: 64px;
    min-height: 44px;
    padding: 0 18px;
    font-size: 15px;
    font-weight: 600;
    color: #fff;
    background: var(--accent);
    border: none;
    border-radius: 22px;
    cursor: pointer;
    transition: background 120ms ease, transform 80ms ease;
  }

  .composer button:hover:not(:disabled) { background: var(--accent-hover); }
  .composer button:active:not(:disabled) { transform: scale(0.97); }

  .composer button:disabled {
    background: var(--disabled);
    cursor: not-allowed;
  }

  @media (max-width: 600px) {
    .app {
      border-left: none;
      border-right: none;
    }
    header { padding: 24px 16px 16px; }
    header h1 { font-size: 24px; }
    .messages { padding: 16px; }
    .msg { max-width: 88%; }
    form.composer { padding: 10px 16px; }
  }
</style>
</head>
<body>
  <div class="app" role="application" aria-label="AriAI chat">
    <header>
      <h1>AriAI</h1>
      <p>Your AI mentor, coach, and guide.</p>
    </header>

    <div class="messages" id="messages" aria-live="polite">
      <div class="msg msg--rei">Hey — I'm AriAI. I'm here to help you think, learn, and grow. What's on your mind?</div>
    </div>

    <form class="composer" id="composer" autocomplete="off">
      <input
        type="text"
        id="input"
        placeholder="Ask me anything..."
        aria-label="Message AriAI"
      />
      <button type="submit" id="send" disabled>Send</button>
    </form>
  </div>

  <script>
    (function () {
      const messages = document.getElementById('messages');
      const form = document.getElementById('composer');
      const input = document.getElementById('input');
      const sendBtn = document.getElementById('send');

      function scrollToBottom() {
        messages.scrollTop = messages.scrollHeight;
      }

      function addMessage(text, who) {
        const el = document.createElement('div');
        el.className = 'msg ' + (who === 'user' ? 'msg--user' : 'msg--rei');
        el.textContent = text;
        messages.appendChild(el);
        scrollToBottom();
        return el;
      }

      function addTyping() {
        const el = document.createElement('div');
        el.className = 'msg msg--rei msg--typing';
        el.setAttribute('aria-label', 'AriAI is typing');
        el.innerHTML = '<span></span><span></span><span></span>';
        messages.appendChild(el);
        scrollToBottom();
        return el;
      }

      input.addEventListener('input', function () {
        sendBtn.disabled = input.value.trim().length === 0;
      });

      form.addEventListener('submit', function (e) {
        e.preventDefault();
        const text = input.value.trim();
        if (!text) return;

        addMessage(text, 'user');
        input.value = '';
        sendBtn.disabled = true;
        input.disabled = true;

        const typing = addTyping();

        setTimeout(function () {
          typing.remove();
          addMessage("I'm still learning. Full responses coming soon.", 'rei');
          input.disabled = false;
          input.focus();
        }, 1000);
      });

      input.focus();
    })();
  </script>
</body>
</html>
